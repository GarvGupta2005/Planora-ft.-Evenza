<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Details — Planora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/dashboard.css" />
  <style>
    .event-hero {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 24px;
    }
    .hero-banner {
      height: 200px;
      background: linear-gradient(135deg, var(--purple), var(--cyan));
      position: relative;
    }
    .hero-emoji {
      position: absolute;
      bottom: -30px;
      left: 30px;
      font-size: 60px;
      background: var(--bg-card);
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 24px;
      border: 4px solid var(--bg-body);
      box-shadow: var(--shadow-lg);
    }
    .hero-body {
      padding: 50px 30px 30px;
    }
    .hero-title {
      font-size: 32px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 8px;
    }
    .hero-meta {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      color: var(--text-dim);
      font-size: 14px;
    }
    .hero-meta span {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .event-content {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 24px;
    }
    .details-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
    }
    .details-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--text);
    }
    .details-text {
      color: var(--text-muted);
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .sidebar-sticky {
      position: sticky;
      top: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .action-card {
      background: var(--bg-card-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      text-align: center;
    }
    .price-tag {
      font-size: 24px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 4px;
    }
    .spots-left {
      font-size: 13px;
      color: var(--green);
      font-weight: 600;
      margin-bottom: 20px;
    }
    .btn-full {
      width: 100%;
      justify-content: center;
      margin-bottom: 12px;
    }
    @media (max-width: 900px) {
      .event-content { grid-template-columns: 1fr; }
      .sidebar-sticky { position: static; }
    }
  </style>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <!-- Reusing sidebar structure from home.html -->
  <div class="sidebar-top">
    <a href="../home/home.html" class="sidebar-logo"><span class="logo-hex">⬡</span><span class="logo-name">Planora</span></a>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section-label">Main</div>
    <a href="../home/home.html" class="nav-item"><svg class="nav-icon" viewBox="0 0 20 20" fill="none"><path d="M3 9.5L10 3l7 6.5V17a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M7 18V12h6v6" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg><span>Home</span></a>
    <a href="../join-event/join-event.html" class="nav-item"><svg class="nav-icon" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.4"/><path d="M10 7v6M7 10h6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg><span>Join Event</span></a>
  </nav>
  <div class="sidebar-footer">
    <div class="sidebar-user"><div class="user-avatar">??</div><div class="user-info"><span class="user-name">Loading...</span></div></div>
  </div>
</aside>

<main class="main-content">
  <header class="topbar">
    <div class="topbar-left">
      <div class="topbar-breadcrumb">
        <a href="../home/home.html">Home</a>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 3l4 4-4 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        <span>Event Details</span>
      </div>
    </div>
  </header>

  <div class="content" id="eventDetailContent">
    <div id="loadingState" style="text-align:center;padding:100px 0;">
      <div class="spinner" style="margin:0 auto 20px"></div>
      <p style="color:var(--text-dim)">Fetching event details...</p>
    </div>

    <!-- Details will be injected here -->
  </div>
</main>

<script src="../../shared/js/ui.js"></script>
<script src="event-details.js"></script>
</body>
</html>
